; harness.ini
;
; WIC ICO Fuzzing Harness -- Runtime Configuration  [v4]
; Target: windowscodecs.dll
;
; All keys are optional.  Missing keys use compiled-in defaults from config.h.
; The harness runs correctly with no INI file present.
;
; -------------------------------------------------------------------------------
; CAMPAIGN OVERVIEW
;
; This harness is designed to be run as two complementary campaigns.  Each
; campaign targets a distinct internal code path inside windowscodecs.dll
; that is unreachable from the other.  Running both maximises total coverage.
;
; Campaign 1 (default build -- this file):
;   Metadata cache mode: WICDecodeMetadataCacheOnDemand
;   WIC parses metadata lazily, on first access via GetMetadataQueryReader.
;   This matches how Explorer, preview handlers, and thumbnail generators
;   open ICO files.  Bugs found here are directly exploitable in real-world
;   scenarios.  This is the primary campaign.
;
;   Build:
;     cl ... /D HARNESS_MODE_FUZZ ... /Fe:harness.exe
;
;   Run (TinyInst):
;     afl-fuzz.exe -i corpus -o findings_c1 -fuzz_iterations 5000 \
;       -target_module harness.exe -target_method fuzz_target -nargs 1 \
;       -instrument_module windowscodecs.dll -- harness.exe @@
;
; Campaign 2 (requires /D HARNESS_CACHE_ON_LOAD):
;   Metadata cache mode: WICDecodeMetadataCacheOnLoad
;   WIC parses all metadata immediately inside CreateDecoderFromFilename.
;   This exercises the eager deserialisation code path, which is a distinct
;   internal implementation from the lazy path.  Complementary to Campaign 1.
;
;   Build:
;     cl ... /D HARNESS_MODE_FUZZ /D HARNESS_CACHE_ON_LOAD ... /Fe:harness_c2.exe
;
;   Run (TinyInst):
;     afl-fuzz.exe -i corpus -o findings_c2 -fuzz_iterations 5000 \
;       -target_module harness_c2.exe -target_method fuzz_target -nargs 1 \
;       -instrument_module windowscodecs.dll -- harness_c2.exe @@
;
; Keep -o output directories separate.  Coverage bitmaps from the two
; campaigns are not comparable and must not be mixed.
; -------------------------------------------------------------------------------

[harness]

; ---- Policy limits ----

; max_width: maximum decoded frame width in pixels.
;            Frames wider than this are skipped before CopyPixels.
;            Default: 16384.
max_width         = 16384

; max_height: maximum decoded frame height in pixels.
;             Default: 16384.
max_height        = 16384

; max_frames: maximum ICO frames processed per file.
;             ICONDIR can declare up to 65535 entries.
;             Default: 256.
max_frames        = 256

; max_buffer_mb: maximum pixel buffer allocation in megabytes.
;                Buffers exceeding this are skipped.
;                Default: 256.
max_buffer_mb     = 256

; ---- Iteration control ----

; iterations: number of fuzz_target() calls in standalone mode.
;             Valid range: 1 to 1000000.  Values outside this range are
;             silently ignored and the compiled-in default (5000) is used.
;             Overridden by WinAFL -fuzz_iterations at runtime.
;             Default: 5000.
iterations        = 5000

; ---- Coverage path feature flags ----
; Set to 0 to disable a path for performance tuning.
; All paths are enabled by default.
; Disabling a path reduces coverage depth but increases throughput.

; conversion_path: IWICFormatConverter -> 32bppBGRA -> CopyPixels.
;                  Exercises the format conversion pipeline.
conversion_path   = 1

; trace_enabled: write trace file to harness_trace.txt.
;                Always enabled in RESEARCH build regardless of this value.
;                Disable in FUZZ builds for maximum throughput.
trace_enabled     = 1

; metadata_enum: enumerate container and per-frame metadata via
;                IWICMetadataQueryReader + IWICEnumMetadataItem.
;                Recursive descent into nested VT_UNKNOWN readers (XMP/EXIF).
;                Also queries known PNG-in-ICO key paths via GetMetadataByName.
;                In Campaign 1 (CacheOnDemand), this call triggers the actual
;                lazy metadata parse inside windowscodecs.dll.
metadata_enum     = 1

; palette_path: extract palette via IWICPalette::GetColors.
;               Critical for 1/4/8bpp ICO frames.
palette_path      = 1

; color_context_path: extract ICC profiles via GetColorContexts.
;                     Uses IWICImagingFactory2::CreateColorContext.
color_context_path= 1

; thumbnail_path: call GetPreview + GetThumbnail at container and frame level.
thumbnail_path    = 1

; decoder_info_path: call GetDecoderInfo + DoesSupportMultiframe etc.
decoder_info_path = 1

; transform_path: call IWICBitmapSourceTransform::CopyPixels at half scale.
;                 Exercises dimension scaling arithmetic (overflow surface).
;                 QI failure (not supported) is expected and silently skipped.
transform_path    = 1

; progressive_path: call IWICProgressiveLevelControl::SetCurrentLevel +
;                   CopyPixels for each progressive level.
;                   Exercises Adam7 interlace paths in libpng for PNG-in-ICO.
;                   QI failure (non-progressive frames) is expected.
progressive_path  = 1

; wic_convert_path: call WICConvertBitmapSource.
;                   Exercises a distinct internal conversion code path not
;                   reachable via the manual IWICFormatConverter path.
wic_convert_path  = 1

; ---- Mode ----
; mode: FUZZ or RESEARCH.
;       FUZZ     : exceptions propagate to WinAFL (no SEH handler).
;       RESEARCH : SEH handler logs exception code + last stage, re-raises.
;                  Also enables COM apartment thread-ID validation and
;                  forced IWICFormatConverter::Initialize sub-path.
;       Note: this INI key does NOT override the compile-time build flag.
;             /D HARNESS_MODE_FUZZ or /D HARNESS_MODE_RESEARCH takes precedence.
mode              = FUZZ
