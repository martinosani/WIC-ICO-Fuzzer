; harness.ini
;
; WIC ICO Fuzzing Harness -- Runtime Configuration
; Target: windowscodecs.dll via WIC COM interfaces.
;
; All keys are optional.  Missing keys use compiled-in defaults (balanced profile).
; The harness runs correctly with no INI file present.
;
; -------------------------------------------------------------------------------
; POLICY PHILOSOPHY
;
; This harness is bug-hunting oriented.  The policy never rejects a frame
; because its declared dimensions are large or unusual.  Frames with extreme
; dimensions (width=200000, height=1 etc.) still exercise all cheap COM paths:
; GetPixelFormat, GetResolution, CopyPalette, GetColorContexts,
; GetMetadataQueryReader, GetThumbnail, IWICFormatConverter probe,
; WICConvertBitmapSource, IWICBitmapSourceTransform capability probe.
;
; Only heap-allocation-backed paths (CopyPixels full, CopyPixels partial,
; full transform/progressive decode) are gated on FRAME_BUDGET.  The budget
; is selected by overflow-safe 64-bit arithmetic in policy_select_budget():
;   - If stride or buffer computation overflows or exceeds max_buffer_mb,
;     the frame receives BUDGET_METADATA_ONLY (cheap paths only, no allocation)
;   - Otherwise the frame receives BUDGET_FULL (all paths)
;   - BUDGET_SKIP fires only for zero-dimension frames
;
; -------------------------------------------------------------------------------
; EXECUTION PROFILES
;
; policy_profile selects a pre-configured bundle of limits and feature flags.
; Individual keys below override the profile preset.
;
; fast     -- maximum throughput, minimal paths, no metadata/transform/progressive
;             Suitable for: initial corpus triage, large seed exploration
;             max_buffer_mb=32, iterations=10000
;
; balanced -- all paths, budget-gated allocation (DEFAULT)
;             Suitable for: sustained WinAFL+TinyInst campaigns
;             max_buffer_mb=128, iterations=5000
;
; deep     -- all paths, maximum metadata depth, large allocation budget
;             Suitable for: targeted hunting on interesting seed subsets
;             Pair with: PageHeap on windowscodecs.dll, iterations=200
;             max_buffer_mb=256, iterations=200
;
; -------------------------------------------------------------------------------
; CAMPAIGN OVERVIEW
;
; Campaign 1 (default build -- this file):
;   Metadata cache mode: WICDecodeMetadataCacheOnDemand
;   WIC parses metadata lazily, on first access via GetMetadataQueryReader.
;   Matches how Explorer, preview handlers, and thumbnail generators open ICO.
;   Bugs found here are directly exploitable in real-world attack scenarios.
;
;   Build:
;     cl /nologo /W3 /O2 /D HARNESS_MODE_FUZZ ^
;        main.c policy.c ini.c trace.c ^
;        /link ole32.lib oleaut32.lib windowscodecs.lib shlwapi.lib ^
;        /Fe:harness_c1.exe
;
; Campaign 2 (requires /D HARNESS_CACHE_ON_LOAD):
;   Metadata cache mode: WICDecodeMetadataCacheOnLoad
;   All metadata parsed immediately on decoder creation -- distinct internal path.
;   Keep output directories separate; coverage bitmaps are not comparable.
;
;   Build:
;     cl /nologo /W3 /O2 /D HARNESS_MODE_FUZZ /D HARNESS_CACHE_ON_LOAD ^
;        main.c policy.c ini.c trace.c ^
;        /link ole32.lib oleaut32.lib windowscodecs.lib shlwapi.lib ^
;        /Fe:harness_c2.exe
; -------------------------------------------------------------------------------

[harness]

; ---- Execution profile ----
;
; policy_profile: fast | balanced | deep
;   Sets all resource limits and feature flags as a bundle.
;   Individual keys below override the profile preset.
;   Default: balanced
policy_profile    = balanced

; ---- Policy limits ----
;
; NOTE: max_width and max_height are SOFT HINTS only.
; They control budget selection (BUDGET_FULL vs BUDGET_METADATA_ONLY),
; NOT frame skip decisions.  Frames above these values still exercise
; all cheap COM paths; only allocation-backed paths are skipped.
; Do NOT lower them to try to "clean up" the fuzzing run.

; max_width: soft hint for budget selection (pixels).  Range: [1, 65535].
max_width         = 65535

; max_height: soft hint for budget selection (pixels).  Range: [1, 65535].
max_height        = 65535

; max_frames: maximum ICO frames processed per file.  Range: [1, 65535].
max_frames        = 256

; max_buffer_mb: hard cap on CopyPixels allocation per frame, in megabytes.
;   This is the REAL harness safety net (not max_width/max_height).
;   Profile fast=32, balanced=128, deep=256.  Range: [1, 512].
max_buffer_mb     = 128

; max_stride_mb: hard cap on computed row stride, in megabytes.
;   Set equal to max_buffer_mb for arithmetic consistency.  Range: [1, 512].
max_stride_mb     = 128

; max_color_contexts: maximum IWICColorContext objects per GetColorContexts call.
;   Range: [1, 256].
max_color_contexts = 64

; max_palette_colors: maximum palette entries passed to IWICPalette::GetColors.
;   Range: [1, 65536].
max_palette_colors = 4096

; max_metadata_items: maximum items per single IWICEnumMetadataItem reader.
;   Range: [1, 65536].
max_metadata_items = 4096

; max_total_metadata_items: maximum items across ALL readers per fuzz_target().
;   Guards against throughput collapse on deeply nested malformed metadata.
;   Profile fast=2048, balanced=8192, deep=65536.  Range: [1, 1048576].
max_total_metadata_items = 8192

; ---- Iteration control ----

; iterations: fuzz_target() calls in standalone mode.
;   Overridden by WinAFL -fuzz_iterations at runtime.
;   Profile fast=10000, balanced=5000, deep=200.  Range: [1, 1000000].
iterations        = 5000

; ---- Coverage path feature flags ----
; Set to 0 to disable a path.

; conversion_path: IWICFormatConverter -> 32bppBGRA -> CopyPixels.
;   Runs for all budgets (allocation gated internally by policy arithmetic).
conversion_path   = 1

; trace_enabled: write iteration trace to harness_trace.txt.
;   Disable in long FUZZ builds for maximum throughput.
trace_enabled     = 1

; metadata_enum: enumerate container and frame metadata via
;   IWICMetadataQueryReader + IWICEnumMetadataItem.
;   Recursive descent into nested VT_UNKNOWN readers (XMP/EXIF).
;   Disabled in fast profile.
metadata_enum     = 1

; palette_path: extract palette via IWICPalette::GetColors.
;   Critical for 1/4/8bpp ICO frames.
palette_path      = 1

; color_context_path: extract ICC profiles via GetColorContexts.
;   Exercises iCCP chunk parsing for PNG-in-ICO frames.
color_context_path = 1

; thumbnail_path: call GetPreview and GetThumbnail at container and frame level.
thumbnail_path    = 1

; decoder_info_path: call GetDecoderInfo and query capability flags.
decoder_info_path = 1

; transform_path: IWICBitmapSourceTransform capability probe + CopyPixels at
;   half scale (gated on BUDGET_FULL internally).
;   Runs for all budgets: the QI + DoesSupportTransform probe is always cheap.
transform_path    = 1

; progressive_path: IWICProgressiveLevelControl per-level decode.
;   Exercises the Adam7 interlaced path in libpng for PNG-in-ICO.
progressive_path  = 1

; wic_convert_path: WICConvertBitmapSource.
;   Runs for all budgets; CopyPixels gated on BUDGET_FULL internally.
;   Exercises format validation on unexpected pixel format GUIDs.
wic_convert_path  = 1

; ---- Mode ----
; mode: FUZZ or RESEARCH.
;   FUZZ     : exceptions propagate to WinAFL (no SEH wrapper).
;   RESEARCH : SEH handler logs exception code + last trace stage.
;   Note: INI key does NOT override compile-time /D HARNESS_MODE_FUZZ.
mode              = FUZZ
