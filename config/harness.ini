; harness.ini
;
; WIC ICO Fuzzing Harness -- Runtime Configuration
; Target: windowscodecs.dll via WIC COM interfaces.
;
; All keys are optional.  Missing keys use compiled-in defaults from config.h.
; The harness runs correctly with no INI file present.
;
; -------------------------------------------------------------------------------
; CAMPAIGN OVERVIEW
;
; Run two complementary campaigns to maximise coverage of windowscodecs.dll.
; Each targets a distinct internal code path unreachable from the other.
;
; Campaign 1 (default build -- this file):
;   Metadata cache mode: WICDecodeMetadataCacheOnDemand
;   WIC parses metadata lazily, on first access via GetMetadataQueryReader.
;   This matches how Explorer, preview handlers, and thumbnail generators
;   open ICO files.  Bugs found here are directly exploitable in real-world
;   attack scenarios (no additional preconditions).
;
;   Build:
;     cl /nologo /W3 /O2 /D HARNESS_MODE_FUZZ ^
;        main.c policy.c ini.c trace.c ^
;        /link ole32.lib oleaut32.lib windowscodecs.lib shlwapi.lib ^
;        /Fe:harness_c1.exe
;
; Campaign 2 (requires /D HARNESS_CACHE_ON_LOAD):
;   Metadata cache mode: WICDecodeMetadataCacheOnLoad
;   WIC parses all metadata immediately inside CreateDecoderFromFilename.
;   Exercises the eager deserialisation code path -- a distinct internal
;   implementation from the lazy path.
;
;   Build:
;     cl /nologo /W3 /O2 /D HARNESS_MODE_FUZZ /D HARNESS_CACHE_ON_LOAD ^
;        main.c policy.c ini.c trace.c ^
;        /link ole32.lib oleaut32.lib windowscodecs.lib shlwapi.lib ^
;        /Fe:harness_c2.exe
;
; Keep -o output directories separate.  WinAFL coverage bitmaps from the
; two campaigns are not comparable and must not be mixed.
; -------------------------------------------------------------------------------

[harness]

; ---- Policy limits ----
;
; These caps define what the harness will attempt to decode.
; Raise them to allow more inputs through; lower only if OOM or timeouts
; are collapsing throughput unacceptably.

; max_width: maximum decoded frame width in pixels.
;            Frames wider than this are skipped before CopyPixels.
;            Range: [1, 65535].  Default: 65535.
max_width         = 65535

; max_height: maximum decoded frame height in pixels.
;             Range: [1, 65535].  Default: 65535.
max_height        = 65535

; max_frames: maximum ICO frames processed per file.
;             ICONDIR can declare up to 65535 entries.
;             Range: [1, 65535].  Default: 256.
max_frames        = 256

; max_buffer_mb: maximum pixel buffer allocation per frame, in megabytes.
;                Frames requiring a larger buffer are skipped.
;                Range: [1, 512].  Default: 256.
max_buffer_mb     = 256

; max_stride_mb: maximum row stride per frame, in megabytes.
;                Range: [1, 512].  Default: 256.
max_stride_mb     = 256

; max_color_contexts: maximum IWICColorContext objects per GetColorContexts call.
;                     Range: [1, 256].  Default: 64.
max_color_contexts = 64

; max_palette_colors: maximum palette entries passed to IWICPalette::GetColors.
;                     Range: [1, 65536].  Default: 4096.
max_palette_colors = 4096

; max_metadata_items: maximum items enumerated per single IWICEnumMetadataItem reader.
;                     Range: [1, 65536].  Default: 4096.
max_metadata_items = 4096

; max_total_metadata_items: maximum items enumerated across ALL metadata readers
;                           (including recursive sub-readers) per fuzz_target() call.
;                           Guards against throughput collapse on deeply nested metadata.
;                           Range: [1, 1048576].  Default: 16384.
max_total_metadata_items = 16384

; ---- Iteration control ----

; iterations: number of fuzz_target() calls in standalone mode.
;             Valid range: [1, 1000000].  Out-of-range values use the compiled
;             default (5000).  Overridden by WinAFL -fuzz_iterations at runtime.
;             Default: 5000.
iterations        = 5000

; ---- Coverage path feature flags ----
; Set to 0 to disable a path for throughput tuning.
; All paths are enabled by default.

; conversion_path: IWICFormatConverter -> 32bppBGRA -> CopyPixels.
;                  Exercises the internal format conversion pipeline.
conversion_path   = 1

; trace_enabled: write iteration trace to harness_trace.txt.
;                Disable in FUZZ builds for maximum throughput.
;                Always enabled in RESEARCH builds regardless of this value.
trace_enabled     = 1

; metadata_enum: enumerate container and frame metadata via
;                IWICMetadataQueryReader + IWICEnumMetadataItem.
;                Recursive descent into nested VT_UNKNOWN readers (XMP/EXIF).
;                Also queries known PNG-in-ICO key paths via GetMetadataByName.
;                In Campaign 1 (CacheOnDemand) this triggers the lazy metadata
;                parse inside windowscodecs.dll.
metadata_enum     = 1

; palette_path: extract palette via IWICPalette::GetColors.
;               Critical for 1/4/8bpp ICO frames.
palette_path      = 1

; color_context_path: extract ICC profiles via GetColorContexts.
;                     Exercises iCCP chunk parsing for PNG-in-ICO frames.
color_context_path = 1

; thumbnail_path: call GetPreview and GetThumbnail at container and frame level.
thumbnail_path    = 1

; decoder_info_path: call GetDecoderInfo and query capability flags.
decoder_info_path = 1

; transform_path: call IWICBitmapSourceTransform::CopyPixels at half scale.
;                 Exercises dimension scaling arithmetic (overflow surface).
;                 QI failure is expected for most BMP-payload frames.
transform_path    = 1

; progressive_path: call IWICProgressiveLevelControl::SetCurrentLevel + CopyPixels
;                   for each progressive level.
;                   Exercises the Adam7 interlace path in libpng for PNG-in-ICO.
;                   QI failure is expected for non-progressive frames.
progressive_path  = 1

; wic_convert_path: call WICConvertBitmapSource.
;                   Exercises a distinct internal conversion code path not
;                   reachable via the manual IWICFormatConverter sequence.
wic_convert_path  = 1

; ---- Mode ----
; mode: FUZZ or RESEARCH.
;       FUZZ     : exceptions propagate to WinAFL (no SEH wrapper).
;       RESEARCH : SEH handler logs exception code + last trace stage,
;                  then re-raises so the debugger can catch it.
;       Note: this INI key does NOT override the compile-time build flag.
;             /D HARNESS_MODE_FUZZ or /D HARNESS_MODE_RESEARCH takes precedence.
mode              = FUZZ
