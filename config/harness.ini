; harness.ini
;
; WIC ICO Fuzzing Harness — Runtime Configuration  [v2]
; Target: windowscodecs.dll
;
; All keys are optional. Missing keys use compiled-in defaults from harness_config.h.
; The harness runs correctly with no INI file present.
;
; v2 additions:
;   transform_path    — IWICBitmapSourceTransform scaled decode path (Fix #7)
;   progressive_path  — IWICProgressiveLevelControl path (Fix #8)
;   wic_convert_path  — WICConvertBitmapSource single-call path (Fix #11)
;
; For the second fuzzing campaign (Fix #15), rebuild with /D HARNESS_CACHE_ON_DEMAND
; and use a separate output directory:
;   afl-fuzz.exe -i corpus -o findings_ondemand ...
;
; -------------------------------------------------------------------------------

[harness]

; ---- Policy limits ----
; max_width  : maximum decoded frame width in pixels. Frames exceeding this
;              are skipped before CopyPixels. Default: 16384.
max_width         = 16384

; max_height : maximum decoded frame height in pixels. Default: 16384.
max_height        = 16384

; max_frames : maximum number of ICO frames processed per file.
;              ICONDIR can declare up to 65535 entries. Default: 256.
max_frames        = 256

; max_buffer_mb : maximum pixel buffer size in megabytes.
;                 Buffers exceeding this are skipped. Default: 256.
max_buffer_mb     = 256

; ---- Iteration control ----
; iterations : number of fuzz_target() calls in standalone mode.
;              Overridden by WinAFL -fuzz_iterations at runtime.
;              Default: 5000.
iterations        = 5000

; ---- Coverage path feature flags ----
; Set to 0 to disable a coverage path for performance tuning.
; All paths are enabled by default. Disabling reduces coverage depth
; but increases iteration throughput for quick triage passes.

; conversion_path : IWICFormatConverter -> 32bppBGRA -> CopyPixels
;                   Exercises the format conversion pipeline.
conversion_path   = 1

; trace_enabled : write trace file to harness_trace.txt.
;                 Always enabled in RESEARCH build regardless of this value.
;                 Disable in FUZZ builds for maximum throughput.
trace_enabled     = 1

; metadata_enum : enumerate container and per-frame metadata via
;                 IWICMetadataQueryReader + IWICEnumMetadataItem.
;                 v2: recursive descent into nested VT_UNKNOWN readers (Fix #6).
metadata_enum     = 1

; palette_path : extract palette via IWICPalette::GetColors.
;                Critical for 1/4/8bpp ICO frames.
palette_path      = 1

; color_context_path : extract ICC profiles via GetColorContexts.
;                      Uses IWICImagingFactory2::CreateColorContext (Fix #3).
color_context_path= 1

; thumbnail_path : call GetPreview + GetThumbnail at container and frame level.
thumbnail_path    = 1

; decoder_info_path : call GetDecoderInfo + DoesSupportMultiframe etc.
decoder_info_path = 1

; transform_path : call IWICBitmapSourceTransform::CopyPixels at half scale.
;                  Exercises dimension scaling arithmetic — overflow surface.
;                  QI failure (not supported) is expected and silently skipped.
;                  (Fix #7 — Ryo Tanaka)
transform_path    = 1

; progressive_path : call IWICProgressiveLevelControl::SetCurrentLevel +
;                    CopyPixels for each progressive level.
;                    Exercises Adam7 interlace paths in libpng for PNG-in-ICO.
;                    QI failure (non-progressive frames) is expected.
;                    (Fix #8 — Ryo Tanaka)
progressive_path  = 1

; wic_convert_path : call WICConvertBitmapSource (identified at 0x18000A1940).
;                    Exercises a distinct internal conversion code path not
;                    reachable via the manual IWICFormatConverter path.
;                    (Fix #11 — Ryo Tanaka)
wic_convert_path  = 1

; ---- Mode ----
; mode : FUZZ or RESEARCH.
;        FUZZ     : exceptions propagate to WinAFL (no SEH handler)
;        RESEARCH : SEH handler logs exception code + last stage, re-raises.
;        Note: this INI key does not override the compile-time build flag.
;              /D HARNESS_MODE_FUZZ or /D HARNESS_MODE_RESEARCH takes precedence.
mode              = FUZZ
